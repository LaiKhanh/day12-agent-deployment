version: "3.9"

services:
  agent:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_API_KEY=secret
    depends_on:
      - redis

  redis:
    image: redis:7

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - agent
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf